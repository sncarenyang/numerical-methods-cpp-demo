name: C++ CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compile
      run: make
    - name: Test
      run: make run | grep -q "1.414"  # Verify output
permissions:
  contents: read
  actions: write
